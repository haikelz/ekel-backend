services:
  guestbook-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 4000:4000
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - guestbook-backend-network
    volumes:
      - ./logs:/root/logs
      - ./assets:/root/assets

networks:
  guestbook-backend-network:
    driver: bridge
